name: Deploy Backend

on:
  push:
    branches: [master]      # usa "main" si ese es tu branch por defecto
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/chablas/abril-backend   # OJO: todo en minúsculas

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # para que el runner pueda subir la imagen a GHCR
    steps:
      - uses: actions/checkout@v4

      # 1) Login al registro de contenedores de GitHub (GHCR)
      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      # 2) Compilar la imagen EN EL RUNNER (7GB RAM) y subirla a GHCR
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 3) En el VPS: solo bajar la imagen y reiniciar el contenedor (rápido)
      - name: Desplegar en el VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull "$IMAGE:latest"
            docker stop abril-backend 2>/dev/null || true
            docker rm   abril-backend 2>/dev/null || true
            docker run -d --name abril-backend --restart unless-stopped \
              --network host \
              --log-opt max-size=10m --log-opt max-file=5 \
              -e ASPNETCORE_ENVIRONMENT=Production \
              -e ASPNETCORE_URLS=http://127.0.0.1:8080 \
              -e ASPNETCORE_FORWARDEDHEADERS_ENABLED=true \
              -v /opt/abril/appsettings.Production.json:/app/appsettings.Production.json:ro \
              "$IMAGE:latest"
            docker image prune -f
            docker logout ghcr.io
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE: ${{ env.IMAGE }}
