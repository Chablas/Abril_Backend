# Configuración de Loki en modo "single binary" con almacenamiento en disco.
# Pensada para una sola VPS (no clúster). Retención de 30 días por defecto.

auth_enabled: false

server:
  http_listen_port: 3100
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 720h          # 30 días; sube/baja según el disco disponible
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_query_series: 5000
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16

# El compactor aplica la retención y borra los chunks vencidos.
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  delete_request_store: filesystem

# Analytics anónimas desactivadas.
analytics:
  reporting_enabled: false
